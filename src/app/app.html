@if (currentStep() === 'language') {
  <app-language-gate (languageSelected)="onLanguageSelected($event)" />
}

@if (currentStep() === 'chat' && selectedLanguage()) {
  <app-intro-chat
    [language]="selectedLanguage()!"
    (optionSelected)="onIntroOptionSelected($event)"
    (backToLanguage)="backToLanguageGate()"
  />
}

@if (currentStep() === 'warning' && selectedLanguage()) {
  <app-system-warning
    [language]="selectedLanguage()!"
    [selectedOption]="selectedIntroOption()"
    (sequenceFinished)="unlockExperienceMode()"
    (skipRequested)="unlockExperienceMode()"
  />
}

@if (currentStep() === 'experience' && selectedLanguage()) {
  <app-experience-mode [language]="selectedLanguage()!" />
}
