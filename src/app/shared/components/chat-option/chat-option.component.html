<button
  type="button"
  (click)="selectOption()"
  class="group relative overflow-hidden rounded-full border border-cyan-300/20 bg-cyan-300/[0.04] px-5 py-3 font-mono text-xs uppercase tracking-[0.25em] text-cyan-100 transition duration-300 hover:-translate-y-0.5 hover:border-cyan-300/60 hover:bg-cyan-300/[0.12] hover:shadow-[0_0_35px_rgba(34,211,238,0.18)]"
>
  <span
    class="pointer-events-none absolute inset-0 translate-x-[-120%] bg-gradient-to-r from-transparent via-white/15 to-transparent transition duration-700 group-hover:translate-x-[120%]"
  ></span>

  <span class="relative z-10">
    {{ label }}
  </span>
</button>
