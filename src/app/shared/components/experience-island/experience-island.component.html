<button
  type="button"
  (click)="selectIsland()"
  class="group relative w-full text-left transition duration-500 hover:-translate-y-2"
  [class]="island.positionClass"
>
  <div
    class="absolute -inset-4 rounded-full blur-3xl transition duration-500 group-hover:opacity-100"
    [class]="island.glowClass"
  ></div>

  <div
    class="relative min-h-[220px] overflow-hidden rounded-[28px] border bg-black/50 p-5 shadow-[0_22px_80px_rgba(0,0,0,0.45)] backdrop-blur-xl transition duration-500"
    [class.border-cyan-300]="selected"
    [class.border-white\/10]="!selected"
    [class.bg-cyan-300\/10]="selected"
    [class.hover\:border-cyan-300\/60]="!selected"
  >
    <div
      class="pointer-events-none absolute inset-0 bg-gradient-to-br from-white/[0.08] via-transparent to-transparent opacity-60"
    ></div>

    <div
      class="pointer-events-none absolute -right-10 -top-10 h-28 w-28 rounded-full bg-white/5 blur-2xl"
    ></div>

    <div class="relative z-10 flex h-full flex-col">
      <div class="flex items-start justify-between gap-4">
        <div
          class="flex h-12 w-12 items-center justify-center rounded-2xl border border-white/10 bg-white/[0.06] text-2xl shadow-inner"
        >
          {{ island.icon }}
        </div>

        <span
          class="rounded-full border border-cyan-300/20 bg-cyan-300/[0.07] px-3 py-1 font-mono text-[10px] uppercase tracking-[0.22em] text-cyan-100"
        >
          {{ island.code }}
        </span>
      </div>

      <h3 class="mt-5 text-xl font-bold text-white">
        {{ island.title }}
      </h3>

      <p class="mt-2 line-clamp-3 text-sm leading-6 text-slate-400">
        {{ island.subtitle }}
      </p>

      <div
        class="mt-auto flex items-center gap-2 pt-5 font-mono text-[11px] uppercase tracking-[0.22em] text-cyan-200/70"
      >
        <span class="h-1.5 w-1.5 rounded-full bg-cyan-300"></span>
        <span>Open module</span>
      </div>
    </div>
  </div>
</button>
