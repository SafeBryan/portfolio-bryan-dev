<div class="pointer-events-none fixed inset-0 z-50">
  <button
    #pawButton
    type="button"
    aria-label="Hidden memory signal"
    (click)="revealCompanion()"
    class="pointer-events-auto absolute bottom-5 right-5 flex h-11 w-11 items-center justify-center rounded-full border border-pink-300/20 bg-pink-300/[0.045] text-pink-200/70 opacity-40 shadow-[0_0_30px_rgba(244,114,182,0.08)] backdrop-blur-xl transition duration-300 hover:scale-110 hover:border-pink-300/60 hover:bg-pink-300/[0.10] hover:text-pink-100 hover:opacity-100 focus:outline-none focus:ring-2 focus:ring-pink-300/40 sm:bottom-7 sm:right-7"
    [class]="activated() ? 'border-pink-300/45 bg-pink-300/[0.09] opacity-80' : ''"
  >
    <span class="sr-only">Hidden companion</span>

    <svg viewBox="0 0 64 64" class="h-6 w-6" fill="none" aria-hidden="true">
      <path
        d="M31.9 30.6c7.2 0 13.1 5.4 13.1 12.1 0 5.1-3.9 8.3-13.1 8.3s-13.1-3.2-13.1-8.3c0-6.7 5.9-12.1 13.1-12.1Z"
        fill="currentColor"
        opacity="0.95"
      />
      <circle cx="19.5" cy="24.5" r="5.3" fill="currentColor" opacity="0.82" />
      <circle cx="30" cy="18.5" r="5.3" fill="currentColor" opacity="0.82" />
      <circle cx="42.8" cy="24.5" r="5.3" fill="currentColor" opacity="0.82" />
    </svg>
  </button>

  @if (companionVisible()) {
    <section
      #companionPanel
      class="pointer-events-auto absolute bottom-20 right-5 w-[min(380px,calc(100vw-2.5rem))] overflow-hidden rounded-[32px] border border-pink-300/20 bg-slate-950/92 p-5 text-white shadow-[0_28px_90px_rgba(0,0,0,0.58)] backdrop-blur-2xl sm:bottom-24 sm:right-7"
    >
      <div
        class="pointer-events-none absolute -right-20 -top-20 h-48 w-48 rounded-full bg-pink-300/16 blur-3xl"
      ></div>

      <div
        class="pointer-events-none absolute -bottom-20 left-8 h-44 w-44 rounded-full bg-cyan-300/10 blur-3xl"
      ></div>

      <div
        data-panel-glitch
        class="pointer-events-none absolute left-0 top-16 h-px w-full origin-left bg-gradient-to-r from-transparent via-pink-300/70 to-transparent opacity-0"
      ></div>

      <button
        type="button"
        aria-label="Close hidden companion"
        (click)="hideCompanion()"
        class="absolute right-4 top-4 z-20 rounded-full border border-white/10 bg-white/[0.04] px-3 py-1 font-mono text-[10px] uppercase tracking-[0.18em] text-slate-400 transition hover:border-pink-300/40 hover:text-pink-100"
      >
        close
      </button>

      <div class="relative z-10">
        <div class="flex items-center gap-2">
          <span
            class="h-2 w-2 rounded-full bg-pink-300 shadow-[0_0_18px_rgba(244,114,182,0.7)]"
          ></span>

          <p class="font-mono text-[10px] uppercase tracking-[0.28em] text-pink-200/70">
            hidden.signal
          </p>
        </div>

        <div
          class="relative mx-auto mt-4 flex h-[270px] w-full items-center justify-center overflow-hidden rounded-[28px] border border-pink-300/10 bg-black/25 group cursor-pointer"
          (click)="interactWithDog()"
        >
          <div
            class="pointer-events-none absolute inset-0 z-20 bg-[linear-gradient(transparent_50%,rgba(0,0,0,0.25)_50%)] bg-[length:100%_4px] opacity-30 mix-blend-overlay"
          ></div>

          <span
            data-spark
            class="absolute left-9 top-10 h-2 w-2 rounded-full bg-pink-300 shadow-[0_0_18px_rgba(244,114,182,0.8)]"
          ></span>

          <span
            data-spark
            class="absolute right-12 top-14 h-2 w-2 rounded-full bg-cyan-200 shadow-[0_0_18px_rgba(103,232,249,0.65)]"
          ></span>

          <span
            data-spark
            class="absolute bottom-12 left-14 h-1.5 w-1.5 rounded-full bg-pink-200 shadow-[0_0_18px_rgba(251,207,232,0.8)]"
          ></span>

          <span
            data-spark
            class="absolute bottom-16 right-16 h-1.5 w-1.5 rounded-full bg-fuchsia-200 shadow-[0_0_18px_rgba(240,171,252,0.8)]"
          ></span>

          <div
            data-dog-sprite
            class="sprite-stage transition-transform duration-300 group-hover:scale-105"
            [class.sprite-stage--walk]="spriteMode() === 'walk'"
            [class.sprite-stage--wave]="spriteMode() === 'wave'"
            [class.sprite-stage--sleep]="spriteMode() === 'sleep'"
            aria-hidden="true"
          >
            <div class="sprite-grid">
              @for (pixel of spritePixels(); track $index) {
                <span class="sprite-cell" [class]="pixelClass(pixel)"></span>
              }
            </div>
          </div>
        </div>

        <div
          data-speech
          class="mt-4 rounded-[24px] border border-pink-300/15 bg-pink-300/[0.055] p-4 opacity-0"
        >
          <p class="font-mono text-[10px] uppercase tracking-[0.26em] text-pink-200/70">
            memory.fragment
          </p>

          <p class="mt-3 text-sm leading-6 text-slate-300">
            Un pequeño recuerdo escondido en el sistema. Toca el panel para interactuar.
          </p>
        </div>
      </div>
    </section>
  }
</div>
