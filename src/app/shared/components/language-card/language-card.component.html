<button
  type="button"
  (click)="selectLanguage()"
  class="group relative w-full overflow-hidden rounded-[24px] border border-white/10 bg-white/[0.04] px-6 py-5 text-left shadow-[0_20px_60px_rgba(0,0,0,0.35)] backdrop-blur-xl transition duration-300 hover:-translate-y-1 hover:border-cyan-300/50 hover:bg-cyan-300/[0.07] hover:shadow-[0_24px_80px_rgba(34,211,238,0.12)]"
>
  <div
    class="pointer-events-none absolute inset-0 bg-gradient-to-r from-transparent via-white/[0.06] to-transparent opacity-0 transition duration-500 group-hover:opacity-100"
  ></div>

  <div class="relative z-10 flex items-center gap-5">
    <div
      class="flex h-14 w-14 items-center justify-center rounded-2xl border border-white/10 bg-black/40 text-2xl shadow-inner"
    >
      {{ symbol }}
    </div>

    <div class="min-w-0">
      <p class="font-mono text-xs uppercase tracking-[0.35em] text-cyan-200/70">
        {{ code }}
      </p>

      <h3 class="mt-1 text-2xl font-semibold text-white">
        {{ title }}
      </h3>

      <p class="mt-1 text-sm text-slate-400">
        {{ subtitle }}
      </p>
    </div>
  </div>
</button>
